version: "3.9"

services:

  # ─── Backend FastAPI ──────────────────────────────────────────────────────
  backend:
    build: .
    container_name: tsp-backend
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/app/ml/models
    volumes:
      - ./app/ml/models:/app/app/ml/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend React (Lovable Export) ─────────────────────────────────────
  # frontend:
  #   build: ../frontend
  #   container_name: tsp-frontend
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - backend

networks:
  default:
    name: tsp-network
